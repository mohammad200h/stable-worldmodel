# Memory-safe LeWM training for a single machine with 2× RTX 4090 (24 GB each).
#
# The default lewm.yaml (batch_size=128, num_workers=6, prefetch_factor=3,
# persistent_workers=True, devices=auto) can OOM system RAM: DDP spawns
# 2×num_workers DataLoader processes, each prefetching large image batches.
#
# Usage:
#   python3 lewm_state.py --config-name lewm_state_local data=pusht

defaults:
  - lewm_state
  - _self_

num_workers: 4


output_model_name_prefix: lewm_mountain_car_state
# Built at runtime by resolve_run_names / lewm_hyperparameter_search.py
output_model_name: null
embed_dim: [2, 4, 8, 16, 32, 64, 128]
# Shared input mode for enabled RL heads (reward + continue)
rl_prediction_heads_input: [current_emb, current_and_pred_emb, current_pred_emb_and_action]

reward_prediction:
  enabled: true
  mode: current_emb
  weight: 1.0

continue_prediction:
  enabled: true
  mode: current_emb
  weight: 1.0

wandb:
  project: lewm_mountain_car_state_hyperparameter_search
  name: null




trainer:
  devices: 2
  max_epochs: 40

loader:
  batch_size: 192
  num_workers: ${num_workers}
  prefetch_factor: 2
  persistent_workers: True

data:
  dataset:
    keys_to_cache: []