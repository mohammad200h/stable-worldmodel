# @package _global_
# Local launcher configuration (no SLURM)

defaults:
  - override /hydra/launcher: basic

n_gpus: 1
cpus_per_task: 8
cache_dir: null # Use stable-worldmodel default cache
track: false
wandb:
  enabled: ${track}
  project: stable-worldmodel
  name: ${output_model_name}
  # Kept for scripts that still pass **cfg.wandb.config to WandbLogger.
  config:
    project: stable-worldmodel
    name: ${output_model_name}
    save_code: true
    log_model: false
